version: "3.9"

networks:
  triage_net:
    driver: bridge

services:
  mongo:
    image: mongo:7
    container_name: triage_mongo
    restart: unless-stopped
    networks:
      - triage_net
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: triage_backend
    restart: unless-stopped
    networks:
      - triage_net
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/tickettriage
      CORS_ORIGIN: "http://localhost:3000"
      NODE_ENV: production
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: triage_frontend
    restart: unless-stopped
    networks:
      - triage_net
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

volumes:
  mongo_data: